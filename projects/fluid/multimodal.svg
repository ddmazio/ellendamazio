<svg viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="700" height="560" fill="#FFFFFF"/>

  <!-- connecting lines -->
  <line x1="350" y1="270" x2="180" y2="150" stroke="#ECECEC" stroke-width="1.5"/>
  <line x1="350" y1="270" x2="520" y2="150" stroke="#ECECEC" stroke-width="1.5"/>
  <line x1="350" y1="300" x2="350" y2="420" stroke="#ECECEC" stroke-width="1.5"/>

  <!-- patient, centre -->
  <circle cx="350" cy="270" r="66" fill="#FFFFFF" stroke="#2E4150" stroke-width="1.5"/>
  <text x="350" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#2E4150">Patient</text>
  <text x="350" y="282" text-anchor="middle" font-size="11" fill="#818A92">at centre</text>

  <!-- lamp node, left -->
  <circle cx="150" cy="120" r="46" fill="#CF6B3C"/>
  <text x="150" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Lamp</text>
  <text x="150" y="131" text-anchor="middle" font-size="10" fill="#FDEDE8">luminous</text>
  <text x="70" y="198" font-size="12" font-weight="600" fill="#2E4150">Colour</text>
  <text x="70" y="214" font-size="11" fill="#818A92">light movement</text>
  <text x="70" y="230" font-size="11" fill="#818A92">translates emotion</text>

  <!-- watch node, right -->
  <circle cx="550" cy="120" r="46" fill="#3498DB"/>
  <text x="550" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Watch</text>
  <text x="550" y="131" text-anchor="middle" font-size="10" fill="#EAF4FC">haptic</text>
  <text x="470" y="198" font-size="12" font-weight="600" fill="#2E4150">Vibration</text>
  <text x="470" y="214" font-size="11" fill="#818A92">alerts caregiver</text>
  <text x="470" y="230" font-size="11" fill="#818A92">mirrors lamp colour</text>

  <!-- sound node, below -->
  <circle cx="350" cy="470" r="46" fill="#2E4150"/>
  <text x="350" y="466" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Sound</text>
  <text x="350" y="481" text-anchor="middle" font-size="10" fill="#B7BEC4">sonic</text>

  <!-- soundwave glyph -->
  <g stroke="#2E4150" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="300" y1="530" x2="300" y2="540"/>
    <line x1="315" y1="522" x2="315" y2="548"/>
    <line x1="330" y1="514" x2="330" y2="556"/>
    <line x1="345" y1="520" x2="345" y2="550"/>
    <line x1="360" y1="514" x2="360" y2="556"/>
    <line x1="375" y1="522" x2="375" y2="548"/>
    <line x1="390" y1="530" x2="390" y2="540"/>
  </g>
  <text x="350" y="500" text-anchor="middle" font-size="11" fill="#818A92">calming music &amp; AI voice guidance</text>

  <text x="350" y="40" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1" fill="#A6ADB3">MULTIMODAL INTERACTION</text>
</svg>
